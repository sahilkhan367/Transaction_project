<!DOCTYPE html>
<html>
<head>
    <title>All Data</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .content-wrapper {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 900px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.2em;
            font-weight: 600;
            position: relative;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e1e5e9;
            background: white;
            transition: background-color 0.3s ease;
        }

        tr:hover td {
            background: #f8f9fa;
        }

        tr:last-child td {
            border-bottom: none;
        }

        a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 5px 10px;
            border-radius: 6px;
            margin: 0 2px;
        }

        a:hover {
            background: #667eea;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 3px 8px rgba(102, 126, 234, 0.3);
        }

        a:active {
            transform: translateY(0);
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .content-wrapper {
                padding: 30px 20px;
                margin: 10px;
            }

            h2 {
                font-size: 1.8em;
            }

            table {
                font-size: 14px;
            }

            th, td {
                padding: 10px 8px;
            }
        }

        @media (max-width: 600px) {
            table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }

            th, td {
                padding: 8px 6px;
                font-size: 12px;
            }
        }

        /* Loading animation for table rows */
        tr {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <h2>Stored Data</h2>
        <table border="1" cellpadding="5">
            <tr>
                <th>Name</th>
                <th>RFID</th>
                <th>Employee ID</th>
                <th>Actions</th>
            </tr>
            {% for doc in data %}
            <tr>
                <td>{{ doc['Name'] }}</td>
                <td>{{ doc['RFID'] }}</td>
                <td>{{ doc['Employee ID'] }}</td>
                <td>
                    <a href="/update/{{ doc['_id'] }}">Update</a> |
                    <a href="/delete/{{ doc['_id'] }}">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </table>
        <br>
        <a href="/">Insert New Data</a>
    </div>
</body>
</html>
